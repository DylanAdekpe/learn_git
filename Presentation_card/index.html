<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Presentation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main
      class="d-flex justify-content-center align-items-center max-vw-100 max-vh-100"
    >
      <div class="container w-50 h-50 mt-5 mb-5 mx-auto">
        <h1>My Presentation Card</h1>
        <div class="card" style="width: 50vw">
          <div class="card-image w-100" style="height: 30vh">
            <img
              src="./DYLAN_ADEKPE_CV.png"
              alt="Profile Picture"
              class="card-img-top"
            />
          </div>
          <div class="card-body w-3 h-100">
            <div class="card-content">
              <h5 class="card-title">Dylan ADEKPE</h5>
              <div class="card-subtitle">Software Developer</div>
              <div class="card-description">
                <p class="card-text">
                  Passionate about creating amazing web experiences
                </p>
              </div>
              <a href="#" class="btn btn-primary">Contact</a>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
